    <!-- ═══════ ANIMATION ENHANCEMENTS ═══════ -->
    <style>
      /* ── سلاسة التمرير العامة ── */
      html { scroll-behavior: smooth; }

      /* ── تحديد النص ── */
      ::selection {
        background: #007aff33;
        color: inherit;
      }

      /* ══════════════════════════════════════
         DYNAMIC BACKGROUND — خلفية ديناميكية
         ══════════════════════════════════════ */

      /* طبقة أساسية متحركة على الـ body */
      body {
        background-image:
          radial-gradient(ellipse 80% 60% at 15% 20%, #007aff12 0%, transparent 60%),
          radial-gradient(ellipse 70% 50% at 85% 75%, #af52de0e 0%, transparent 55%),
          radial-gradient(ellipse 60% 40% at 50% 110%, #5ac8fa0a 0%, transparent 50%);
      }

      /* blob 1 — أزرق — أعلى اليمين */
      #root::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        border-radius: 50%;
        width: 680px;
        height: 680px;
        top: -220px;
        right: -180px;
        background: radial-gradient(circle at center,
          #007aff1c 0%,
          #af52de10 40%,
          transparent 70%);
        filter: blur(72px);
        animation: bgBlob1 20s ease-in-out infinite;
      }

      /* blob 2 — بنفسجي / تيل — أسفل اليسار */
      #root::after {
        content: '';
        position: fixed;
        pointer-events: none;
        z-index: -1;
        border-radius: 50%;
        width: 580px;
        height: 580px;
        bottom: -160px;
        left: -140px;
        background: radial-gradient(circle at center,
          #af52de16 0%,
          #5ac8fa10 40%,
          transparent 70%);
        filter: blur(64px);
        animation: bgBlob2 26s ease-in-out infinite;
      }

      /* حركة الـ blobs */
      @keyframes bgBlob1 {
        0%,  100% { transform: translate(0,    0)    scale(1);    }
        25%         { transform: translate(-50px, 50px)  scale(1.12); }
        50%         { transform: translate(40px,  -60px) scale(.92); }
        75%         { transform: translate(60px,  30px)  scale(1.06); }
      }

      @keyframes bgBlob2 {
        0%,  100% { transform: translate(0,    0)    scale(1);    }
        30%         { transform: translate(60px,  -50px) scale(1.10); }
        60%         { transform: translate(-40px, 40px)  scale(.93); }
        85%         { transform: translate(30px,  60px)  scale(1.07); }
      }

      /* وضع داكن — blobs أكثر وضوحاً */
      [data-theme=dark] body {
        background-image:
          radial-gradient(ellipse 80% 60% at 15% 20%, #007aff1a 0%, transparent 60%),
          radial-gradient(ellipse 70% 50% at 85% 75%, #af52de16 0%, transparent 55%),
          radial-gradient(ellipse 60% 40% at 50% 110%, #5ac8fa0f 0%, transparent 50%);
      }

      [data-theme=dark] #root::before {
        background: radial-gradient(circle at center,
          #007aff2a 0%,
          #af52de1a 40%,
          transparent 70%);
      }

      [data-theme=dark] #root::after {
        background: radial-gradient(circle at center,
          #af52de22 0%,
          #5ac8fa18 40%,
          transparent 70%);
      }

      /* ══════════════════════════════════════
         TITLE PADDING — نداء الرحمن عبود
         ══════════════════════════════════════ */
      .grad-name {
        padding-top:    20px;
        padding-bottom: 16px;
        display: block;
      }

      /* ── fadeUp: إضافة blur للدخول وتحسين الـ easing ── */
      @keyframes fadeUp {
        0%   { opacity: 0; transform: translateY(28px) scale(.96); filter: blur(4px); }
        60%  { filter: blur(0); }
        100% { opacity: 1; transform: translateY(0)   scale(1);    filter: blur(0); }
      }

      /* ── ringIn: دخول أكثر احترافية ── */
      @keyframes ringIn {
        0%  { opacity: 0; filter: blur(16px); transform: scale(.55) rotate(-8deg); }
        65% { opacity: 1; filter: blur(0);    transform: scale(1.05) rotate(1.5deg); }
        85% { transform: scale(.98) rotate(-.5deg); }
        100%{ opacity: 1; filter: blur(0);    transform: scale(1) rotate(0); }
      }

      /* ── ringFloat: طفو أكثر نعومة ── */
      @keyframes ringFloat {
        0%,  100% { transform: translateY(0)    rotate(0deg); }
        25%        { transform: translateY(-8px)  rotate(.4deg); }
        50%        { transform: translateY(-13px) rotate(0deg); }
        75%        { transform: translateY(-6px)  rotate(-.3deg); }
      }

      /* ── glowPulse: توهج أكثر حيوية ── */
      @keyframes glowPulse {
        0%, 100% {
          box-shadow:
            0 0 0 1.5px #ffffff80,
            0 8px 40px #007aff45,
            0 2px 14px #af52de30;
        }
        50% {
          box-shadow:
            0 0 0 3px #ffffffb0,
            0 14px 56px #007aff70,
            0 6px 28px #af52de55;
        }
      }

      /* ── gradDrift: تدفق أكثر ديناميكية ── */
      @keyframes gradDrift {
        0%   { background-position: 0%   50%; }
        33%  { background-position: 60%  50%; }
        66%  { background-position: 100% 50%; }
        100% { background-position: 0%   50%; }
      }

      /* ── orb: حركة أكثر حيوية ── */
      @keyframes orb {
        0%,  100% { transform: translate(0, 0)       scale(1); }
        25%         { transform: translate(28px, -20px) scale(1.08); }
        50%         { transform: translate(10px, 22px)  scale(.95); }
        75%         { transform: translate(-18px, 8px)  scale(1.04); }
      }

      @keyframes orbAlt {
        0%,  100% { transform: translate(0, 0)        scale(1); }
        30%         { transform: translate(-22px, 26px)  scale(1.10); }
        60%         { transform: translate(20px, -18px)  scale(.94); }
        85%         { transform: translate(-8px, 10px)   scale(1.03); }
      }

      /* ── shimmerSweep: أسرع وأكثر بريقاً ── */
      @keyframes shimmerSweep {
        0%   { left: -120%; opacity: .7; }
        100% { left: 140%;  opacity: 1; }
      }

      /* ── slideDown: دخول أنعم ── */
      @keyframes slideDown {
        0%   { opacity: 0; transform: translateY(-16px) scale(.97); filter: blur(3px); }
        70%  { filter: blur(0); }
        100% { opacity: 1; transform: translateY(0)     scale(1);   filter: blur(0); }
      }

      /* ── scrollCue: أكثر وضوحاً ── */
      @keyframes scrollCue {
        0%,  100% { opacity: .25; transform: translate(-50%) translateY(0); }
        50%        { opacity: .55; transform: translate(-50%) translateY(7px); }
      }

      /* ── dot: حركة أوسع ── */
      @keyframes dot {
        0%,  100% { opacity: var(--op, .06); transform: translateY(0); }
        50%        { opacity: calc(var(--op, .06) * 2.2); transform: translateY(-12px); }
      }

      /* ── أداء: تلميحات المتصفح ── */
      .anim-ring   { will-change: transform, box-shadow; }
      .anim-1, .anim-2, .anim-3,
      .anim-4, .anim-5, .anim-6 { will-change: opacity, transform, filter; }

      /* ── احترام تفضيل تقليل الحركة ── */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration:      .01ms !important;
          animation-iteration-count: 1   !important;
          transition-duration:     .01ms !important;
        }
      }
    </style>
